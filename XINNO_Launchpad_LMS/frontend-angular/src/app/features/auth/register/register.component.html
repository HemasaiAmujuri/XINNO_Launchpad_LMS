<div class="relative min-h-screen overflow-hidden bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50">
  <canvas #canvas class="fixed inset-0 w-full h-full"></canvas>
  <div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-2xl">
      <div class="backdrop-blur-xl bg-white/10 rounded-3xl shadow-2xl border border-white/20 p-8">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-4 shadow-lg">
            <i class="bi bi-person-plus-fill text-4xl text-white"></i>
          </div>
          <h1 class="text-3xl font-bold text-gray-800 mb-2">Create Account</h1>
          <p class="text-gray-600">Join us and start your learning journey today</p>
        </div>
        <div *ngIf="success" class="mb-6 p-4 bg-green-100/80 border border-green-300 rounded-xl backdrop-blur-sm">
          <p class="text-green-700 text-sm">{{ success }}</p>
        </div>
        <div *ngIf="error" class="mb-6 p-4 bg-red-100/80 border border-red-300 rounded-xl backdrop-blur-sm">
          <p class="text-red-700 text-sm">{{ error }}</p>
        </div>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
              <input type="text" formControlName="name" placeholder="John Doe" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
              <p *ngIf="name?.invalid && name?.touched" class="mt-1 text-xs text-red-600">Name required</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
              <input type="email" formControlName="email" placeholder="you@example.com" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
              <p *ngIf="email?.invalid && email?.touched" class="mt-1 text-xs text-red-600">Valid email required</p>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Password *</label>
              <input type="password" formControlName="password" placeholder="••••••••" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
              <p *ngIf="password?.invalid && password?.touched" class="mt-1 text-xs text-red-600">6+ characters required</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password *</label>
              <input type="password" formControlName="confirmPassword" placeholder="••••••••" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
              <p *ngIf="registerForm.errors?.['mismatch'] && confirmPassword?.touched" class="mt-1 text-xs text-red-600">Passwords must match</p>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Course Type *</label>
              <select formControlName="courseType" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
                <option value="" class="bg-white">Select Course</option>
                <option *ngFor="let type of courseTypes" [value]="type.value" class="bg-white">{{ type.label }}</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Course Level *</label>
              <select formControlName="courseLevel" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
                <option value="" class="bg-white">Select Level</option>
                <option *ngFor="let level of courseLevels" [value]="level.value" class="bg-white">{{ level.label }}</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Batch Name *</label>
              <input type="text" formControlName="batchName" placeholder="Batch 2026-A" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Roll Number *</label>
              <input type="text" formControlName="rollNumber" placeholder="2026001" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
            </div>
          </div>
          <button type="submit" [disabled]="registerForm.invalid || loading" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg disabled:opacity-50 transition-all">
            <span *ngIf="!loading">Create Account</span>
            <span *ngIf="loading">Creating...</span>
          </button>
        </form>
        <div class="text-center mt-8">
          <a routerLink="/login" class="text-indigo-600 hover:text-indigo-700 font-medium">Already have an account? Sign in</a>
        </div>
      </div>
    </div>
  </div>
</div>
