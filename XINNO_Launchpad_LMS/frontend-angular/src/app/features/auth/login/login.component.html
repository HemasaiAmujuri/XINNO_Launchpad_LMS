<div class="relative min-h-screen overflow-hidden bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50">
  <canvas #canvas class="fixed inset-0 w-full h-full"></canvas>
  <div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="backdrop-blur-xl bg-white/10 rounded-3xl shadow-2xl border border-white/20 p-8">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-4 shadow-lg">
            <i class="bi bi-mortarboard text-4xl text-white"></i>
          </div>
          <h1 class="text-3xl font-bold text-gray-800 mb-2">Welcome Back</h1>
          <p class="text-gray-600">Sign in to continue your learning journey</p>
        </div>
        <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-100/80 border border-red-300 rounded-xl backdrop-blur-sm">
          <p class="text-red-700 text-sm">{{ errorMessage }}</p>
        </div>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
            <input type="email" formControlName="email" placeholder="you@example.com" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
            <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="mt-2 text-sm text-red-600">Please enter a valid email</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <input type="password" formControlName="password" placeholder="••••••••" class="w-full px-4 py-3 bg-white/50 backdrop-blur-sm border border-white/30 rounded-xl text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white/70 transition-all">
            <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="mt-2 text-sm text-red-600">Password must be at least 6 characters</p>
          </div>
          <div class="flex justify-end">
            <a routerLink="/forgot-password" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">Forgot password?</a>
          </div>
          <button type="submit" [disabled]="loginForm.invalid || isLoading" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg disabled:opacity-50 transition-all">
            <span *ngIf="!isLoading">Sign In</span>
            <span *ngIf="isLoading">Signing in...</span>
          </button>
        </form>
        <div class="text-center mt-8">
          <a routerLink="/register" class="text-indigo-600 hover:text-indigo-700 font-medium">New user? Create an account</a>
        </div>
      </div>
    </div>
  </div>
</div>
